version: 2

# NOTE: the `gitsubmodule` ecosystem is intentionally OMITTED.
# submodules/UeSaveGame and submodules/CUE4Parse are pinned to deliberately
# validated commits (see README "Why submodules?"): the editor depends on
# exact GVAS round-trip and current-master CUE4Parse behavior, and a pinned
# commit guarantees a tested combination. Bumps are done by hand after
# re-validating against the test fixtures; Dependabot must not move them.

updates:
  # --- .NET / NuGet (packages are centrally managed in Directory.Packages.props) ---
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch
    # The CUE4Parse / UeSaveGame transitive deps are RE-DECLARED in
    # Directory.Packages.props and MUST match the versions the bundled submodule
    # DLLs were built against (submodules/CUE4Parse/Directory.Packages.props is the
    # source of truth). Dependabot bumping any of these in isolation either trips
    # NU1608 (CUE4Parse exact-pins SkiaSharp / SixLabors) or silently ships an
    # untested transitive version. They move ONLY when the CUE4Parse submodule is
    # advanced and the new versions are mirrored here by hand.
    ignore:
      - dependency-name: AssetRipper.TextureDecoder
      - dependency-name: Blake3
      - dependency-name: BouncyCastle.Cryptography
      - dependency-name: FixedMathSharp
      - dependency-name: Fmod5Sharp
      - dependency-name: GenericReader
      - dependency-name: Infrablack.UE4Config
      - dependency-name: K4os.Compression.LZ4.Streams
      - dependency-name: LZMA-SDK
      - dependency-name: Newtonsoft.Json
      - dependency-name: OffiUtils
      - dependency-name: OodleSharp
      - dependency-name: Oodle.NET
      - dependency-name: Serilog
      - dependency-name: Serilog.Sinks.Console
      - dependency-name: SharpGLTF.Core
      - dependency-name: SharpGLTF.Toolkit
      - dependency-name: SixLabors.ImageSharp
      - dependency-name: SkiaSharp
      - dependency-name: SkiaSharp.NativeAssets.Linux.NoDependencies
      - dependency-name: SubstreamSharp
      - dependency-name: System.IO.Hashing
      - dependency-name: VGAudio
      - dependency-name: Zlib-ng.NET
      - dependency-name: ZstdSharp.Port

  # --- VitePress docs site ---
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-all:
        patterns:
          - "*"

  # --- GitHub Actions used by the workflows ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns:
          - "*"
