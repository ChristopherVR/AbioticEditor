name: Release

# Conventional-Commits driven release on every push to main.
#
# Flow:
#   1. `test` builds Core and runs the xUnit suite. EVERYTHING below depends on
#      it, so a failing build or test never produces a release commit, tag, or
#      artifacts; the pipeline simply stops.
#   2. `version` job uses git-cliff to compute the next semver from the
#      commit history. If nothing releasable changed, it sets released=false
#      and the rest of the pipeline is skipped.
#   3. It rewrites <Version> in Directory.Build.props (the single source of
#      truth, since the App inherits ApplicationDisplayVersion=$(Version)),
#      regenerates CHANGELOG.md, commits "chore(release): vX.Y.Z [skip ci]",
#      and pushes a vX.Y.Z tag on that commit.
#   4. `build` publishes the 7 release artifacts off the new tag.
#   5. `publish` attaches them to a GitHub Release.
#   6. `scan` uploads every published zip to VirusTotal and appends the per-file
#      scan permalinks to the release body (needs the VT_API_KEY secret; the job
#      is skipped, not failed, when the secret is absent).
#   7. `nexus` uploads the Windows app zip to the NexusMods page as a new version
#      and archives the previous one (needs the NEXUSMODS_API_KEY secret and the
#      NEXUS_APP_FILE_ID variable; the job is skipped when either is absent).
#   8. `nuget` packs AbioticEditor.Core + AbioticEditor.Plugins.Abstractions off
#      the new tag and pushes them to nuget.org (needs the NUGET_API_KEY secret;
#      the push step is skipped, not failed, when the secret is absent). Each library
#      is only (re)packed when its sources changed since the last release (the version
#      job's `detect` step), so an App/CLI-only release does not bump them; the job is
#      skipped outright when neither changed.
#
# Loop safety: pushes made with the default GITHUB_TOKEN do not retrigger
# workflows. The job-level `if` guard (skip on chore(release)/[skip ci]) is
# belt-and-suspenders.
#
# Concurrency model (per-JOB, not workflow-level, so a fresh push cancels only
# the work that has NOT published anything yet):
#   - Pre-publish jobs (test, build, build-app-win) use `cancel-in-progress: true`.
#     A new push to main aborts these if they are still running, so an abandoned
#     commit never burns a full ~MAUI build.
#   - Publish-side jobs (version, publish, scan, nexus, nuget) use
#     `cancel-in-progress: false`: once one is running it is protected from
#     cancellation, and a newer run's matching job queues behind it. So a release
#     that has begun tagging / creating the GitHub Release / pushing NuGet /
#     uploading to Nexus always finishes rather than being killed half-published.
# Each job gets its OWN group (`release-<job>`) so same-run siblings (build vs.
# build-app-win, the parallel publish legs) are NOT serialized against each other;
# the group only couples the same job across different runs.
#
# A run cancelled mid-build leaves at most an orphaned tag with no GitHub Release;
# the `version` job's republish path (below) re-runs build+publish for it.
#
# NOTE: workflow-level `cancel-in-progress: true` is deliberately NOT used - it
# would cancel the whole run including the protected publish jobs.

on:
  push:
    branches: [main]
  # Manual trigger to force a release on demand (e.g. to re-run build -> app ->
  # publish -> NexusMods when no new commit bumps the version). With force_release
  # left on, the version job cuts a fresh patch release off the latest tag.
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force a release even with no releasable commits (patch bump of the latest tag)."
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # Gate: build Core and run the xUnit suite. Every job below `needs:` this one,
  # so a failing build or test stops the pipeline before any version bump, tag,
  # or release is produced.
  test:
    runs-on: ubuntu-latest
    # Cancellable: a newer push to main aborts this pre-publish gate mid-flight.
    concurrency:
      group: release-test
      cancel-in-progress: true
    # Skip on the bot's own release-bump commit (same guard as `version`). A manual
    # workflow_dispatch always runs (it has no head_commit to inspect).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (!contains(github.event.head_commit.message, 'chore(release)') &&
           !contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The tests build Core, which depends on the submodules
          # (UeSaveGame + CUE4Parse). Without them the build fails.
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      # Cache the global NuGet packages folder so restore (and, for self-contained
      # publishes elsewhere, the large runtime packs) is not re-downloaded every run.
      # NuGet packages are immutable per version, so this is always safe. The key hashes
      # the project/package files; a partial-match restore-key reuses a close cache.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Run tests
        # The suite skips fixture-backed tests gracefully when a fixture is
        # absent, so it is green on a clean CI checkout. The CUE4Parse-Natives
        # "cmake is not recognized" line during the build is benign.
        run: dotnet test tests/AbioticEditor.Tests -f net10.0 -c Release

  version:
    needs: test
    runs-on: ubuntu-latest
    # Protected: this job pushes the release commit + tag. Cancelling it mid-push
    # would risk a committed-but-untagged (or tagged-but-unbuilt) half-state, so a
    # newer run's version job queues behind this one instead of cancelling it.
    concurrency:
      group: release-version
      cancel-in-progress: false
    # Do not run on the bot's own release-bump commit. A manual workflow_dispatch
    # always runs (it has no head_commit to inspect).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (!contains(github.event.head_commit.message, 'chore(release)') &&
           !contains(github.event.head_commit.message, '[skip ci]')) }}
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      released: ${{ steps.compute.outputs.released }}
      # True when re-publishing an existing tag that never shipped a GitHub Release
      # (an orphaned tag from a prior failed build/publish). The bump/commit/tag
      # steps are skipped in that case - only build+publish re-run.
      republish: ${{ steps.compute.outputs.republish }}
      # Per-package NuGet decisions (see the `detect` step). "true"/"false" for a NEW
      # release; EMPTY on a republish (detect is skipped), which the nuget job reads as
      # "publish both". abstractions_dep_version is the SDK version Core's package should
      # depend on (the new version when the SDK is republished, else the latest already on
      # nuget.org so an unchanged SDK can be skipped while Core still resolves).
      nuget_core: ${{ steps.detect.outputs.nuget_core }}
      nuget_abstractions: ${{ steps.detect.outputs.nuget_abstractions }}
      abstractions_dep_version: ${{ steps.detect.outputs.abstractions_dep_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags are required for git-cliff to compute the bump.
          # No submodules needed: this job does not compile any .NET project.
          fetch-depth: 0
          fetch-tags: true

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: compute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty on a push; "true"/"false" on a manual workflow_dispatch.
          FORCE_RELEASE: ${{ github.event.inputs.force_release }}
        run: |
          set -euo pipefail

          # Latest existing release tag (empty if none yet).
          latest_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          echo "Latest tag: ${latest_tag:-<none>}"

          # Next version git-cliff would bump to (e.g. v1.2.0). Falls back to the
          # latest tag when there is nothing releasable.
          bumped="$(git cliff --bumped-version)"
          echo "Bumped version: ${bumped}"

          # Normalised forms: tag keeps the leading v, version strips it.
          tag="$bumped"
          version="${bumped#v}"

          if [ "$bumped" = "$latest_tag" ]; then
            # Manual force (workflow_dispatch with force_release=true): cut a brand-new
            # patch release even though no commit bumps the version, to re-run the full
            # pipeline (build -> app -> publish -> NexusMods). Falls through to the normal
            # bump/commit/tag steps via released=true.
            if [ "${FORCE_RELEASE:-false}" = "true" ]; then
              if [ -n "$latest_tag" ]; then
                ver="${latest_tag#v}"
                MA="${ver%%.*}"; rest="${ver#*.}"; MI="${rest%%.*}"
                PA="${rest#*.}"; PA="${PA%%[!0-9]*}"
                forced="v${MA}.${MI}.$((PA + 1))"
              else
                forced="v1.0.0"
              fi
              echo "force_release=true and nothing to bump; forcing new release ${forced}."
              {
                echo "released=true"
                echo "republish=false"
                echo "version=${forced#v}"
                echo "tag=${forced}"
                echo "prev_tag=${latest_tag}"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Nothing new to bump. But a tag can exist without ever having published
            # a GitHub Release (a prior build/publish failed after the tag was pushed).
            # Such an orphaned tag would otherwise never ship, so re-run build+publish
            # for it instead of skipping.
            if [ -n "$latest_tag" ]; then
              status="$(curl -sS -o /dev/null -w '%{http_code}' \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${latest_tag}" || echo "000")"
              if [ "$status" != "200" ]; then
                echo "Tag ${latest_tag} has no published release (HTTP ${status}); re-publishing it."
                {
                  echo "released=true"
                  echo "republish=true"
                  echo "version=${latest_tag#v}"
                  echo "tag=${latest_tag}"
                } >> "$GITHUB_OUTPUT"
                exit 0
              fi
              echo "Tag ${latest_tag} already has a published release."
            fi
            echo "No releasable commits since ${latest_tag}; skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "republish=false" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # The previous release tag (empty on the very first release). The detect step
          # below diffs prev_tag..HEAD to decide which library packages actually changed.
          echo "prev_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      # Decide which library packages actually changed since the previous release, so the
      # nuget job can skip republishing an unchanged package at a new version number. Runs
      # BEFORE the version bump, so HEAD is still the triggering commit and the diff is
      # exactly the commits being released (the about-to-be-made props bump is not in range,
      # so Directory.Build.props does not falsely flag every release).
      - name: Detect changed packages
        id: detect
        if: steps.compute.outputs.released == 'true' && steps.compute.outputs.republish != 'true'
        env:
          PREV_TAG: ${{ steps.compute.outputs.prev_tag }}
          NEW_VER: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail

          # Default (first release, no prior tag): publish everything.
          abs=true
          core=true

          if [ -n "$PREV_TAG" ]; then
            files="$(git diff --name-only "${PREV_TAG}..HEAD")"
            echo "Changed files since ${PREV_TAG}:"
            echo "$files"

            abs=false
            core=false

            # The SDK package (AbioticEditor.Plugins.Abstractions) bundles UeSaveGame and
            # packs the shared README/notices; its metadata lives in Directory.Build.props.
            # The submodule patterns use (/|$) so a bare gitlink pointer bump (shown by
            # git diff as "submodules/UeSaveGame", no trailing slash) is caught too.
            abs_paths='^(src/AbioticEditor\.Plugins\.Abstractions/|submodules/UeSaveGame(/|$)|README\.md|THIRD-PARTY-NOTICES\.txt|Directory\.Build\.props)'
            if echo "$files" | grep -Eq "$abs_paths"; then abs=true; fi

            # The Core package bundles UeSaveGame.Json + CUE4Parse, re-declares their NuGet
            # deps from Directory.Packages.props, and compiles against the SDK (so any SDK
            # change implies a Core rebuild too).
            core_paths='^(src/AbioticEditor\.Core/|src/AbioticEditor\.Plugins\.Abstractions/|submodules/UeSaveGame(/|$)|submodules/CUE4Parse(/|$)|Directory\.Packages\.props|README\.md|THIRD-PARTY-NOTICES\.txt|Directory\.Build\.props)'
            if echo "$files" | grep -Eq "$core_paths"; then core=true; fi
            if [ "$abs" = "true" ]; then core=true; fi
          fi

          # The SDK version Core's package must depend on: the new version when the SDK is
          # (re)published this release, otherwise the version already live on nuget.org (so an
          # unchanged SDK is NOT republished yet Core still resolves a real dependency).
          dep="$NEW_VER"
          if [ "$abs" != "true" ]; then
            latest_pub="$(curl -sS --max-time 20 \
              'https://api.nuget.org/v3-flatcontainer/abioticeditor.plugins.abstractions/index.json' 2>/dev/null \
              | grep -oE '"[0-9]+\.[0-9]+\.[0-9]+[^"]*"' | tr -d '"' | tail -n1 || true)"
            if [ -n "$latest_pub" ]; then
              dep="$latest_pub"
            elif [ -n "${PREV_TAG#v}" ]; then
              dep="${PREV_TAG#v}"
            fi
          fi

          echo "Decision: nuget_abstractions=$abs nuget_core=$core abstractions_dep_version=$dep"
          {
            echo "nuget_abstractions=$abs"
            echo "nuget_core=$core"
            echo "abstractions_dep_version=$dep"
          } >> "$GITHUB_OUTPUT"

      # The bump / changelog / commit / tag steps only apply to a NEW version. A
      # republish reuses the existing tag and its already-committed props bump.
      - name: Bump <Version> in Directory.Build.props
        if: steps.compute.outputs.released == 'true' && steps.compute.outputs.republish != 'true'
        env:
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail
          # Replace the contents of the first <Version>...</Version> element.
          sed -i -E "s#<Version>[^<]*</Version>#<Version>${VERSION}</Version>#" Directory.Build.props
          echo "Directory.Build.props now:"
          grep -n "<Version>" Directory.Build.props

      - name: Regenerate CHANGELOG.md
        if: steps.compute.outputs.released == 'true' && steps.compute.outputs.republish != 'true'
        run: |
          set -euo pipefail
          # Full changelog, newest first, including the about-to-be-released version.
          git cliff --bump -o CHANGELOG.md

      # Release-notes body for the GitHub Release. Generated BEFORE the tag is
      # pushed: for a new version the notes are the unreleased commits (`--bump`
      # treats them as the next version); for a republish they are the existing
      # tag's section (`--latest`).
      - name: Generate release notes
        if: steps.compute.outputs.released == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.compute.outputs.republish }}" = "true" ]; then
            git cliff --latest --strip header -o RELEASE_NOTES.md
          else
            git cliff --unreleased --bump --strip header -o RELEASE_NOTES.md
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Commit, push, and tag
        if: steps.compute.outputs.released == 'true' && steps.compute.outputs.republish != 'true'
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          branch="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props CHANGELOG.md
          git commit -m "chore(release): ${TAG} [skip ci]"

          # Push the bump back to the branch that triggered the run (main), with a
          # rebase-retry. main can legitimately advance between this run's checkout
          # (at the triggering SHA) and this push - e.g. an OLDER release run's
          # protected `publish` job lands its Scoop-manifest commit while we run.
          # A plain push would then fail non-fast-forward and kill the release; we
          # rebase the single bump commit onto the new tip and retry instead.
          # (Same pattern the Scoop-manifest push uses below.)
          pushed=false
          for attempt in 1 2 3; do
            if git push origin "HEAD:${branch}"; then
              pushed=true
              break
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on origin/${branch}."
            git fetch origin "$branch"
            git rebase "origin/${branch}"
          done
          if [ "$pushed" != true ]; then
            echo "::error::Could not push release bump after 3 attempts."
            exit 1
          fi

          # Tag the release commit we just pushed. After a rebase HEAD is the
          # replayed bump commit, so tag HEAD (not $TAG-on-a-stale-SHA) and push it.
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload release notes
        if: steps.compute.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # CLI artifacts only. The Windows desktop app builds in its own `build-app-win` job
  # (below) so the Windows-only `nexus` upload can depend on just that job instead of
  # waiting for these CLI legs. All four CLI RIDs are self-contained and publishable
  # from Linux, so this matrix is ubuntu-only.
  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    # Cancellable: nothing is published yet, so a newer push aborts these CLI builds.
    # The group MUST include the matrix RID: all four legs are the same job ("build"),
    # so a constant group would make the legs cancel EACH OTHER within one run (only the
    # last-started survives), leaving `publish` - which needs every leg - skipped. Scoping
    # per RID means a leg only cancels the same-RID leg of an older run, as intended.
    concurrency:
      group: release-build-${{ matrix.rid }}
      cancel-in-progress: true
    # Every artifact zip carries the release version in its name (e.g.
    # AbioticEditor-cli-win-x64-v1.2.0.zip). Computed once here; matrix + needs are both in scope.
    env:
      ASSET_BASENAME: ${{ matrix.artifact }}-v${{ needs.version.outputs.version }}
    strategy:
      # One failing target should not abandon the others' artifacts.
      fail-fast: false
      matrix:
        include:
          - artifact: AbioticEditor-cli-win-x64
            rid: win-x64
          - artifact: AbioticEditor-cli-linux-x64
            rid: linux-x64
          - artifact: AbioticEditor-cli-osx-x64
            rid: osx-x64
          - artifact: AbioticEditor-cli-osx-arm64
            rid: osx-arm64
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          # .NET builds REQUIRE the submodules (Core -> UeSaveGame + CUE4Parse).
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          # If the .NET 10 SDK is not yet available as GA on the hosted runners,
          # `dotnet-quality: ga` resolves the latest GA build of the 10.0.x band.
          # Switch to `preview`/`rc` here if a 10.0 GA SDK is not published yet.
          dotnet-quality: ga

      # Cache NuGet, including the self-contained runtime packs (tens of MB per RID)
      # this matrix downloads. Immutable packages, so always safe to reuse.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish CLI
        run: >-
          dotnet publish src/AbioticEditor.Cli
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -o out

      - name: Zip CLI
        run: |
          cd out
          zip -r "../${ASSET_BASENAME}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET_BASENAME }}.zip
          if-no-files-found: error

  # Windows desktop app, built on its own (not in the CLI matrix above) so the
  # Windows-only `nexus` upload depends on just this job and never waits for the CLI
  # legs or the GitHub Release.
  #
  # The macOS (Mac Catalyst) app legs are DISABLED: the .NET 10 MacCatalyst SDK needs
  # Xcode 26.5+ which hosted runners don't reliably ship, so they never produced an
  # artifact. The steps are preserved in git history; to re-enable, add a sibling
  # `build-app-mac` job (runs-on macos-latest) that selects the newest Xcode, installs
  # the MAUI workload, runs `dotnet build -f net10.0-maccatalyst -c Release
  # -p:RuntimeIdentifier=maccatalyst-<arch>`, then zips the produced .app with ditto.
  # NOTE: those bundles were UNSIGNED/un-notarized (Gatekeeper warns; right-click > Open).
  build-app-win:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: windows-latest
    # Cancellable: the MAUI publish is the most expensive leg and publishes
    # nothing, so a newer push aborts it rather than letting it run to completion.
    concurrency:
      group: release-build-app-win
      cancel-in-progress: true
    env:
      ASSET_BASENAME: AbioticEditor-app-win-x64-v${{ needs.version.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          # .NET builds REQUIRE the submodules (Core -> UeSaveGame + CUE4Parse).
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # The MAUI workload install downloads/extracts the platform packs (~159s cold).
      # Cache the SDK's workload directories keyed on the resolved SDK version, then run
      # the install with --skip-manifest-update: on a cache hit the packs are already
      # present so the install is a near no-op (no network), and the pinned SDK ships a
      # manifest sufficient to install MAUI. On a miss it installs fully and seeds the
      # cache. setup-dotnet installs the SDK to C:\Program Files\dotnet on hosted Windows
      # runners, so the workloads land under these folders; a path miss degrades to the
      # old full-install behavior (slower, never broken).
      - name: Resolve .NET SDK version
        id: sdk
        shell: bash
        run: echo "version=$(dotnet --version)" >> "$GITHUB_OUTPUT"

      - name: Cache MAUI workload
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\dotnet\sdk-manifests
            C:\Program Files\dotnet\metadata
            C:\Program Files\dotnet\packs
            C:\Program Files\dotnet\library-packs
            C:\Program Files\dotnet\template-packs
          key: maui-workload-${{ runner.os }}-${{ steps.sdk.outputs.version }}

      - name: Install MAUI workload (Windows)
        run: dotnet workload install maui --skip-manifest-update

      # Self-contained single-file: one AbioticEditor.App.exe with the .NET runtime + all managed
      # deps bundled (no install, no loose DLLs), plus the Mappings.usmap data sidecar. UseMonoRuntime
      # =false selects CoreCLR (MAUI otherwise pulls a Mono runtime pack that isn't published for this
      # SDK band); EnableCompressionInSingleFile shrinks the exe (~419 MB -> ~166 MB); DebugType
      # =embedded keeps symbols inside the exe instead of a sidecar .pdb.
      - name: Publish App (Windows, self-contained single file)
        run: >-
          dotnet publish src/AbioticEditor.App
          -f net10.0-windows10.0.19041.0
          -c Release
          -r win-x64
          --self-contained true
          -p:WindowsPackageType=None
          -p:UseMonoRuntime=false
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=embedded
          -p:ApplicationVersion=${{ github.run_number }}
          -o out

      - name: Zip App (Windows)
        shell: pwsh
        run: Compress-Archive -Path out/* -DestinationPath "$env:ASSET_BASENAME.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AbioticEditor-app-win-x64
          path: ${{ env.ASSET_BASENAME }}.zip
          if-no-files-found: error

  publish:
    needs: [version, build, build-app-win]
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    # Protected: creates the GitHub Release and pushes the Scoop bucket commit.
    # A newer run's publish queues behind this one rather than cancelling it.
    concurrency:
      group: release-publish
      cancel-in-progress: false
    steps:
      # Check out main so we can refresh and commit the Scoop bucket manifests
      # (bucket/*.json) after we know the published assets' hashes. No submodules:
      # this job does not compile anything.
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # Flatten every artifact (the 7 zips + the release notes) into ./dist.
          path: dist
          merge-multiple: true

      - name: Show downloaded files
        run: ls -R dist

      # SHA-256 of every published zip, attached to the release so users can verify
      # an unsigned download. Also the source of truth for the Scoop manifest hashes.
      - name: Generate checksums
        run: |
          set -euo pipefail
          ( cd dist && sha256sum *.zip > SHA256SUMS.txt )
          echo "----- SHA256SUMS.txt -----"
          cat dist/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: dist/RELEASE_NOTES.md
          # The macOS app zips can be absent when the Mac Catalyst legs fail on a
          # runner without Xcode 26.5+ (those legs are continue-on-error). Don't fail
          # the release over them - attach whatever built (Windows, Linux, CLI, and
          # the macOS apps when they do build).
          fail_on_unmatched_files: false
          # Zip names now carry the version (AbioticEditor-<kind>-<rid>-v<version>.zip); attach
          # whatever built via a glob. The macOS app zips can be absent when the Mac Catalyst legs
          # fail on a runner without Xcode 26.5+ (those legs are continue-on-error).
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt

      # Point the Scoop bucket at this release: rewrite version + url + hash in the
      # committed manifests from the actual published Windows zips, then commit back
      # to main. Scoop installs/upgrades read these, and a CLI install sidesteps the
      # SmartScreen prompt that a browser download triggers on the unsigned exe.
      # Runs AFTER the release is published and is best-effort (continue-on-error): a
      # stale bucket is a minor follow-up, never a reason to fail a shipped release.
      # Idempotent: on a republish the values are unchanged, so nothing is committed.
      - name: Refresh and commit Scoop manifests
        continue-on-error: true
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          app_zip="AbioticEditor-app-win-x64-v${VERSION}.zip"
          cli_zip="AbioticEditor-cli-win-x64-v${VERSION}.zip"
          app_hash="$(sha256sum "dist/${app_zip}" | cut -d' ' -f1)"
          cli_hash="$(sha256sum "dist/${cli_zip}" | cut -d' ' -f1)"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"

          jq --arg v "$VERSION" --arg h "$app_hash" --arg u "${base}/${app_zip}" \
             '.version=$v | .architecture["64bit"].url=$u | .architecture["64bit"].hash=$h' \
             bucket/abiotic-editor.json > bucket/abiotic-editor.json.tmp
          mv bucket/abiotic-editor.json.tmp bucket/abiotic-editor.json

          jq --arg v "$VERSION" --arg h "$cli_hash" --arg u "${base}/${cli_zip}" \
             '.version=$v | .architecture["64bit"].url=$u | .architecture["64bit"].hash=$h' \
             bucket/abiotic-editor-cli.json > bucket/abiotic-editor-cli.json.tmp
          mv bucket/abiotic-editor-cli.json.tmp bucket/abiotic-editor-cli.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/abiotic-editor.json bucket/abiotic-editor-cli.json
          if git diff --cached --quiet; then
            echo "Scoop manifests already current; nothing to commit."
            exit 0
          fi
          git commit -m "chore(scoop): point bucket at v${VERSION} [skip ci]"
          # Rebase-retry in case main advanced while this release ran.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed Scoop manifest bump."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on origin/main."
            git fetch origin main
            git rebase origin/main
          done
          echo "::warning::Could not push Scoop manifest bump after 3 attempts."

  # Upload every published zip to VirusTotal and append the per-file scan
  # permalinks to the GitHub Release body, so users can verify an unsigned
  # download against 70+ engines before running it.
  #
  # Needs the VT_API_KEY secret (a free virustotal.com API key). When the secret
  # is absent the whole job no-ops (a warning, not a failure), so the release
  # still ships - mirroring how `nuget` handles a missing NUGET_API_KEY.
  #
  # Runs AFTER `publish` so the release exists to edit. Idempotent on a republish:
  # any prior "VirusTotal scan" section is stripped before the fresh links are
  # appended, so the section never stacks duplicates.
  scan:
    needs: [version, publish]
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    # Protected: edits the already-published release body; never cancelled.
    concurrency:
      group: release-scan
      cancel-in-progress: false
    steps:
      # Gate the rest of the job on the secret being present. `if:` cannot read
      # secrets directly, so surface it as a step output the later steps key on.
      - name: Check for VirusTotal API key
        id: gate
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${VT_API_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VT_API_KEY secret not set; skipping VirusTotal scan."
          fi

      - name: Download all artifacts
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          # Flatten every artifact (the 7 zips + the release notes) into ./dist;
          # only the zips are scanned below.
          path: dist
          merge-multiple: true

      # Uploads each file and waits for the analysis id. `analysis` is emitted as a
      # comma-separated "path=url" list. Large files (the ~166 MB app zip) use VT's
      # big-file upload endpoint, which the action selects automatically.
      - name: Scan zips with VirusTotal
        id: vt
        if: steps.gate.outputs.enabled == 'true'
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            dist/*.zip

      - name: Append VirusTotal results to the release body
        if: steps.gate.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          set -euo pipefail

          # Build the markdown section from the "path=url,path=url" analysis output.
          {
            echo "## VirusTotal scan"
            echo
            echo "Automated multi-engine scan of the published archives:"
            echo
            IFS=',' read -ra items <<< "${ANALYSIS}"
            for item in "${items[@]}"; do
              [ -z "$item" ] && continue
              name="${item%%=*}"
              url="${item#*=}"
              echo "- [\`$(basename "$name")\`](${url})"
            done
          } > vt_section.md
          echo "----- vt_section.md -----"
          cat vt_section.md

          # Fetch the current body, drop any prior VirusTotal section (idempotent on
          # republish), then append the fresh one and write it back. --repo is
          # explicit because this job has no checkout for gh to infer the repo from.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json body --jq '.body' > body.md
          awk 'BEGIN{keep=1} /^## VirusTotal scan/{keep=0} keep{print}' body.md > body.trimmed.md
          mv body.trimmed.md body.md
          printf '\n' >> body.md
          cat vt_section.md >> body.md
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file body.md

  # Publish the Windows app zip to the NexusMods page (mods/244) as a new version
  # and archive the previous one, via the official Nexus-Mods/upload-action.
  #
  # The action adds a new version to an EXISTING file on the mod page, keyed by its
  # numeric file_id (there is no mod_id/game input - the file_id alone identifies
  # the target). Supply that id as the NEXUS_APP_FILE_ID repository variable
  # (Settings -> Secrets and variables -> Actions -> Variables) and a personal
  # NexusMods API key as the NEXUSMODS_API_KEY secret. When either is absent the
  # job no-ops (a warning, not a failure), so the rest of the release still ships.
  #
  # archive_existing_version: true moves the prior version into the file's archive
  # when the new one lands, which is what keeps older releases around but not the
  # primary download. Depends only on `build-app-win` (not `publish`), so the Windows
  # upload runs as soon as the app zip is ready and never waits for the CLI legs or the
  # GitHub Release; it downloads the app artifact directly rather than off the release.
  #
  # NOTE: the action is in open beta; pin bumps to a newer v1.0.0-beta.* tag as
  # they ship. Only the Windows app is uploaded - the CLI and non-Windows zips are
  # not part of the Nexus page.
  nexus:
    needs: [version, build-app-win]
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    # Protected: uploads to NexusMods and archives the prior version. Never
    # cancelled, and a newer run's nexus queues behind so the two uploads cannot
    # race on the archive-existing-version step.
    concurrency:
      group: release-nexus
      cancel-in-progress: false
    steps:
      # Gate on both credentials being present. `if:` can read vars but not secrets,
      # so resolve both here and surface a single step output the later steps key on.
      - name: Check for NexusMods credentials
        id: gate
        env:
          NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
          FILE_ID: ${{ vars.NEXUS_APP_FILE_ID }}
        run: |
          set -euo pipefail
          if [ -n "${NEXUSMODS_API_KEY}" ] && [ -n "${FILE_ID}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NEXUSMODS_API_KEY secret and/or NEXUS_APP_FILE_ID variable not set; skipping NexusMods upload."
          fi

      - name: Download Windows app artifact
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          # The build job uploaded this zip under the matrix artifact name.
          name: AbioticEditor-app-win-x64
          path: dist

      # The `version` job already generated this version's changelog with git-cliff
      # and uploaded it as the `release-notes` artifact. Reuse it here so the Nexus
      # version description carries the SAME notes as the GitHub release - one source
      # of truth, no second changelog to maintain.
      - name: Download release notes
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: dist-notes

      # Turn the git-cliff notes (## [ver] - date / ### Group / - item) into clean
      # plain text for the Nexus version description: drop the redundant version
      # heading (the version field carries it), flatten "### Group" to "Group:", and
      # keep the bullets. Plain text reads correctly whether or not the field renders
      # BBCode. Emitted as a multiline step output the upload step consumes.
      - name: Build NexusMods changelog
        id: changelog
        if: steps.gate.outputs.enabled == 'true'
        env:
          VERSION: ${{ needs.version.outputs.version }}
          TAG: ${{ needs.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          notes="dist-notes/RELEASE_NOTES.md"
          {
            printf 'Abiotic Editor v%s\n\n' "$VERSION"
            printf 'What changed in this version:\n\n'
            if [ -s "$notes" ]; then
              sed -E \
                -e '/^##[[:space:]]*\[/d' \
                -e 's/^###[[:space:]]+(.*)$/\1:/' \
                "$notes"
            else
              printf -- '- See the GitHub release for the full changelog.\n'
            fi
            printf '\nFull changelog and SHA-256 checksums:\n'
            printf 'https://github.com/%s/releases/tag/%s\n' "$REPO" "$TAG"
          } > nexus_description.txt
          echo "----- nexus_description.txt -----"
          cat nexus_description.txt
          {
            echo "body<<__NEXUS_EOF__"
            cat nexus_description.txt
            echo "__NEXUS_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Windows app to NexusMods
        if: steps.gate.outputs.enabled == 'true'
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ vars.NEXUS_APP_FILE_ID }}
          filename: dist/AbioticEditor-app-win-x64-v${{ needs.version.outputs.version }}.zip
          version: ${{ needs.version.outputs.version }}
          display_name: AbioticEditor v${{ needs.version.outputs.version }} (Windows)
          description: ${{ steps.changelog.outputs.body }}
          category: main
          archive_existing_version: true

  # Pack the library packages off the new tag and push them to nuget.org.
  # AbioticEditor.Plugins.Abstractions is what plugin authors compile against;
  # AbioticEditor.Core is the full engine. Both bundle their Apache-2.0 submodule
  # DLLs (UeSaveGame / CUE4Parse) since those are not on NuGet; see the csproj
  # _BundleSubmoduleAssemblies targets and THIRD-PARTY-NOTICES.txt.
  #
  # A package is only (re)packed when its sources actually changed since the last
  # release (the version job's `detect` step), so an App/CLI-only release no longer
  # bumps both libraries to a new version with byte-identical content. The whole job is
  # skipped when neither library changed; the SDK is never published without Core, but
  # Core can publish alone (depending on the SDK version already live on nuget.org).
  nuget:
    needs: version
    # Run when a library changed, OR on a republish (both flags empty -> "!= 'false'" is
    # true). Skipped entirely when both are exactly 'false' (an App/CLI/docs-only release).
    if: >-
      needs.version.outputs.released == 'true' &&
      (needs.version.outputs.nuget_core != 'false' || needs.version.outputs.nuget_abstractions != 'false')
    runs-on: ubuntu-latest
    # Protected: packs and pushes to nuget.org. Never cancelled; a newer run's
    # nuget queues behind (push is --skip-duplicate, so re-runs are idempotent).
    concurrency:
      group: release-nuget
      cancel-in-progress: false
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          # Packing Core/Abstractions compiles them, which requires the submodules.
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Pack packages
        # Version is inherited from Directory.Build.props, already bumped on the tagged
        # commit. ContinuousIntegrationBuild=true makes the build deterministic. Each package
        # is packed only when it changed this release (empty flags -> republish -> pack both).
        env:
          PACK_CORE: ${{ needs.version.outputs.nuget_core }}
          PACK_ABS: ${{ needs.version.outputs.nuget_abstractions }}
          DEP_VER: ${{ needs.version.outputs.abstractions_dep_version }}
        run: |
          set -euo pipefail
          mkdir -p nupkgs

          # Empty (republish) -> publish both; empty dep -> the tag's own version.
          [ -z "$PACK_ABS" ] && PACK_ABS=true
          [ -z "$PACK_CORE" ] && PACK_CORE=true
          [ -z "$DEP_VER" ] && DEP_VER="${{ needs.version.outputs.version }}"

          # PackSubmodules=true bundles the Apache-2.0 submodule DLLs into the packages and
          # suppresses their (non-NuGet) ProjectReference dependencies. It is ONLY set here,
          # so normal app/CLI/test builds keep their transitive access to those assemblies.
          if [ "$PACK_ABS" = "true" ]; then
            dotnet pack src/AbioticEditor.Plugins.Abstractions -c Release \
              -p:ContinuousIntegrationBuild=true -p:PackSubmodules=true -o nupkgs
          else
            echo "Plugins.Abstractions unchanged since the last release - skipping pack."
          fi

          if [ "$PACK_CORE" = "true" ]; then
            # AbstractionsPackageVersion pins Core's dependency on the SDK: the new version
            # when the SDK is republished alongside, else the version already on nuget.org so
            # Core resolves against a real package even though the SDK itself is skipped.
            dotnet pack src/AbioticEditor.Core -c Release \
              -p:ContinuousIntegrationBuild=true -p:PackSubmodules=true \
              -p:AbstractionsPackageVersion="$DEP_VER" -o nupkgs
          else
            echo "Core unchanged since the last release - skipping pack."
          fi

          ls -l nupkgs

      - name: Upload packages as build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
          if-no-files-found: error

      - name: Push to nuget.org
        # Skipped (not failed) until the NUGET_API_KEY secret is configured, so the
        # rest of the release still succeeds. --skip-duplicate makes re-runs idempotent.
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        if: ${{ env.NUGET_API_KEY != '' }}
        run: >-
          dotnet nuget push "nupkgs/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
