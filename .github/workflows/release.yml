name: Release

# Conventional-Commits driven release on every push to main.
#
# Flow:
#   1. `test` builds Core and runs the xUnit suite. EVERYTHING below depends on
#      it, so a failing build or test never produces a release commit, tag, or
#      artifacts — the pipeline simply stops.
#   2. `version` job uses git-cliff to compute the next semver from the
#      commit history. If nothing releasable changed, it sets released=false
#      and the rest of the pipeline is skipped.
#   3. It rewrites <Version> in Directory.Build.props (the single source of
#      truth — the App inherits ApplicationDisplayVersion=$(Version)),
#      regenerates CHANGELOG.md, commits "chore(release): vX.Y.Z [skip ci]",
#      and pushes a vX.Y.Z tag on that commit.
#   4. `build` publishes the 7 release artifacts off the new tag.
#   5. `publish` attaches them to a GitHub Release.
#
# Loop safety: pushes made with the default GITHUB_TOKEN do not retrigger
# workflows. The job-level `if` guard (skip on chore(release)/[skip ci]) is
# belt-and-suspenders.

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Gate: build Core and run the xUnit suite. Every job below `needs:` this one,
  # so a failing build or test stops the pipeline before any version bump, tag,
  # or release is produced.
  test:
    runs-on: ubuntu-latest
    # Skip on the bot's own release-bump commit (same guard as `version`).
    if: >-
      ${{ !contains(github.event.head_commit.message, 'chore(release)') &&
          !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The tests build Core, which depends on the submodules
          # (UeSaveGame + CUE4Parse). Without them the build fails.
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga

      - name: Run tests
        # The suite skips fixture-backed tests gracefully when a fixture is
        # absent, so it is green on a clean CI checkout. The CUE4Parse-Natives
        # "cmake is not recognized" line during the build is benign.
        run: dotnet test tests/AbioticEditor.Tests -f net10.0 -c Release

  version:
    needs: test
    runs-on: ubuntu-latest
    # Do not run on the bot's own release-bump commit.
    if: >-
      ${{ !contains(github.event.head_commit.message, 'chore(release)') &&
          !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      released: ${{ steps.compute.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history + tags are required for git-cliff to compute the bump.
          # No submodules needed: this job does not compile any .NET project.
          fetch-depth: 0
          fetch-tags: true

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: compute
        run: |
          set -euo pipefail

          # Latest existing release tag (empty if none yet).
          latest_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          echo "Latest tag: ${latest_tag:-<none>}"

          # Next version git-cliff would bump to (e.g. v1.2.0). Falls back to the
          # latest tag when there is nothing releasable.
          bumped="$(git cliff --bumped-version)"
          echo "Bumped version: ${bumped}"

          # Normalised forms: tag keeps the leading v, version strips it.
          tag="$bumped"
          version="${bumped#v}"

          if [ "$bumped" = "$latest_tag" ]; then
            echo "No releasable commits since ${latest_tag}; skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Bump <Version> in Directory.Build.props
        if: steps.compute.outputs.released == 'true'
        env:
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -euo pipefail
          # Replace the contents of the first <Version>...</Version> element.
          sed -i -E "s#<Version>[^<]*</Version>#<Version>${VERSION}</Version>#" Directory.Build.props
          echo "Directory.Build.props now:"
          grep -n "<Version>" Directory.Build.props

      - name: Regenerate CHANGELOG.md
        if: steps.compute.outputs.released == 'true'
        run: |
          set -euo pipefail
          # Full changelog, newest first, including the about-to-be-released version.
          git cliff --bump -o CHANGELOG.md
          # This release's notes only (unreleased commits tagged as the new version),
          # with the changelog header stripped, for use as the GitHub Release body.
          git cliff --unreleased --bump --strip header -o RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Commit, push, and tag
        if: steps.compute.outputs.released == 'true'
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props CHANGELOG.md
          git commit -m "chore(release): ${TAG} [skip ci]"
          git push origin HEAD:main
          # Tag the release commit we just pushed.
          git tag "$TAG"
          git push origin "$TAG"

      - name: Upload release notes
        if: steps.compute.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      # One failing target should not abandon the others' artifacts.
      fail-fast: false
      matrix:
        include:
          # --- CLI (self-contained, all 4 RIDs publishable from Linux) ---
          - artifact: AbioticEditor-cli-win-x64
            kind: cli
            rid: win-x64
            os: ubuntu-latest
          - artifact: AbioticEditor-cli-linux-x64
            kind: cli
            rid: linux-x64
            os: ubuntu-latest
          - artifact: AbioticEditor-cli-osx-x64
            kind: cli
            rid: osx-x64
            os: ubuntu-latest
          - artifact: AbioticEditor-cli-osx-arm64
            kind: cli
            rid: osx-arm64
            os: ubuntu-latest
          # --- App: Windows (WinUI, unpackaged) ---
          - artifact: AbioticEditor-app-win-x64
            kind: app-win
            os: windows-latest
          # --- App: macOS (Mac Catalyst) ---
          - artifact: AbioticEditor-app-osx-x64
            kind: app-mac
            mac_arch: x64
            os: macos-latest
          - artifact: AbioticEditor-app-osx-arm64
            kind: app-mac
            mac_arch: arm64
            os: macos-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
          # .NET builds REQUIRE the submodules (Core -> UeSaveGame + CUE4Parse).
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          # If the .NET 10 SDK is not yet available as GA on the hosted runners,
          # `dotnet-quality: ga` resolves the latest GA build of the 10.0.x band.
          # Switch to `preview`/`rc` here if a 10.0 GA SDK is not published yet.
          dotnet-quality: ga

      # --- CLI ---------------------------------------------------------------
      - name: Publish CLI
        if: matrix.kind == 'cli'
        run: >-
          dotnet publish src/AbioticEditor.Cli
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -o out

      - name: Zip CLI
        if: matrix.kind == 'cli'
        run: |
          cd out
          zip -r "../${{ matrix.artifact }}.zip" .

      # --- App: Windows ------------------------------------------------------
      - name: Install MAUI workload (Windows)
        if: matrix.kind == 'app-win'
        run: dotnet workload install maui

      - name: Publish App (Windows, unpackaged)
        if: matrix.kind == 'app-win'
        run: >-
          dotnet publish src/AbioticEditor.App
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:WindowsPackageType=None
          -p:ApplicationVersion=${{ github.run_number }}
          -o out

      - name: Zip App (Windows)
        if: matrix.kind == 'app-win'
        shell: pwsh
        run: Compress-Archive -Path out/* -DestinationPath "${{ matrix.artifact }}.zip"

      # --- App: macOS (Mac Catalyst) ----------------------------------------
      # NOTE: these .app bundles are UNSIGNED and un-notarized. macOS Gatekeeper
      # will warn ("cannot be opened because the developer cannot be verified");
      # users must right-click > Open (or clear the quarantine attribute). Add
      # signing/notarization here once an Apple Developer identity is available.
      - name: Install MAUI workload (macOS)
        if: matrix.kind == 'app-mac'
        run: dotnet workload install maui

      - name: Build App (Mac Catalyst)
        if: matrix.kind == 'app-mac'
        run: >-
          dotnet build src/AbioticEditor.App
          -f net10.0-maccatalyst
          -c Release
          -p:RuntimeIdentifier=maccatalyst-${{ matrix.mac_arch }}
          -p:ApplicationVersion=${{ github.run_number }}

      - name: Locate and zip .app bundle (macOS)
        if: matrix.kind == 'app-mac'
        run: |
          set -euo pipefail
          # Find the produced .app bundle under the Mac Catalyst build output.
          app_path="$(find src/AbioticEditor.App/bin/Release/net10.0-maccatalyst -maxdepth 3 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "::error::No .app bundle found under the Mac Catalyst build output."
            find src/AbioticEditor.App/bin/Release/net10.0-maccatalyst -maxdepth 3 -type d -name '*.app' || true
            exit 1
          fi
          echo "Found app bundle: $app_path"
          # ditto preserves bundle structure / symlinks better than zip on macOS.
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "${{ matrix.artifact }}.zip"

      # --- Upload ------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    needs: [version, build]
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          # Flatten every artifact (the 7 zips + the release notes) into ./dist.
          path: dist
          merge-multiple: true

      - name: Show downloaded files
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body_path: dist/RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            dist/AbioticEditor-cli-win-x64.zip
            dist/AbioticEditor-cli-linux-x64.zip
            dist/AbioticEditor-cli-osx-x64.zip
            dist/AbioticEditor-cli-osx-arm64.zip
            dist/AbioticEditor-app-win-x64.zip
            dist/AbioticEditor-app-osx-x64.zip
            dist/AbioticEditor-app-osx-arm64.zip
