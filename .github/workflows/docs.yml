name: Docs

# Build the VitePress documentation site (docs/) and deploy it to GitHub Pages.
# The docs build is pure Node and does NOT compile the .NET projects, so it does
# NOT need the git submodules (submodules/UeSaveGame, submodules/CUE4Parse).

on:
  push:
    branches: [main, master]
    paths:
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

# Allow only one concurrent deployment. Do NOT cancel an in-progress Pages
# deployment, so a running production deploy is allowed to finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules: the docs site does not build any .NET project.

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build site
        run: npm run docs:build
        working-directory: docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
